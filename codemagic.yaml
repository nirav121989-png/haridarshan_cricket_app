workflows:
  ios-capacitor-workflow:
    name: Haridarshan Cricket iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web App
        script: npm run build
      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Build Unsigned IPA
        script: |
          # Build the archive
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphoneos -configuration Release -archivePath $CM_BUILD_DIR/App.xcarchive archive
          
          # Create IPA via Payload method (Perfect for AltStore/Sideloading)
          mkdir -p build/ios/ipa/Payload
          cp -r $CM_BUILD_DIR/App.xcarchive/Products/Applications/App.app build/ios/ipa/Payload
          cd build/ios/ipa && zip -r HaridarshanCricket.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
